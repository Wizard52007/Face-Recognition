<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Engine Test</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
</head>
<body style="background: #222; color: white; text-align: center; font-family: sans-serif; padding: 50px;">

    <h1>Ultimate AI Engine Test</h1>
    <h2 id="status" style="color: #ffaa00;">1. Loading Hosted Models...</h2>
    
    <video id="webcam" autoplay muted width="640" height="480" style="border: 3px solid #555; border-radius: 10px;"></video>

    <script>
        async function runUltimateTest() {
            const status = document.getElementById('status');
            const video = document.getElementById('webcam');

            try {
                // 2. Load models directly from the hosted CDN (Bypassing your local /models folder entirely)
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                
                await Promise.all([
                    faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);

                status.innerText = "2. Models Loaded. Starting Webcam...";
                status.style.color = "#00aaff";

                // 3. Start Webcam
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;

                video.addEventListener('play', () => {
                    status.innerText = "3. Scanning Live Feed...";
                    
                    // 4. Run the Engine
                    setTimeout(async () => {
                        try {
                            const detection = await faceapi.detectSingleFace(video, new faceapi.SsdMobilenetv1Options());
                            
                            if (detection) {
                                status.innerText = "✅ SUCCESS! THE ENGINE IS ALIVE!";
                                status.style.color = "#00ff00";
                                video.style.borderColor = "#00ff00";
                                console.log("Detection Data:", detection);
                            } else {
                                status.innerText = "⚠️ Works, but no face seen. Look closer.";
                                status.style.color = "#ffff00";
                            }
                        } catch (err) {
                            status.innerText = "❌ CRASH: Check Console.";
                            status.style.color = "#ff0000";
                            console.error("Crash Details:", err);
                        }
                    }, 2000); // Wait 2 seconds for camera to focus
                });

            } catch (err) {
                status.innerText = "Critical Loading Error";
                console.error(err);
            }
        }

        // Wait a brief moment to ensure the script loaded
        setTimeout(runUltimateTest, 1000);
    </script>
</body>
</html>
